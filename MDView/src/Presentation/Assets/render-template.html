<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDView</title>

<!-- Pretendard font (Korean + Latin) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

<!-- highlight.js for syntax highlighting -->
<link rel="stylesheet" id="hljs-theme-light" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github.min.css">
<link rel="stylesheet" id="hljs-theme-dark"  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css" disabled>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>

<!-- KaTeX for math -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body);"></script>

<style>
/* ─── Design Tokens ─────────────────────────────────────────── */
:root, [data-theme="light"] {
  --font-body:    'Pretendard Variable', 'Segoe UI', -apple-system, sans-serif;
  --font-mono:    'Cascadia Code', 'Fira Code', 'Consolas', monospace;

  --color-bg:          #ffffff;
  --color-surface:     #f6f8fa;
  --color-border:      #d0d7de;
  --color-border-muted:#eaeef2;

  --color-text:        #1f2328;
  --color-text-muted:  #636c76;
  --color-text-faint:  #9198a1;

  --color-primary:     #0969da;
  --color-primary-bg:  #ddf4ff;

  --color-success:     #1a7f37;
  --color-success-bg:  #dafbe1;
  --color-warning:     #9a6700;
  --color-warning-bg:  #fff8c5;
  --color-error:       #d1242f;
  --color-error-bg:    #ffebe9;

  --color-code-bg:     #f6f8fa;
  --color-code-text:   #24292f;
  --color-blockquote:  #0969da;

  --color-table-head:  #f6f8fa;
  --color-table-row-alt: #f6f8fa;

  --shadow-sm: 0 1px 0 rgba(31,35,40,0.04);
  --shadow-md: 0 3px 6px rgba(31,35,40,0.12), 0 8px 24px rgba(66,74,83,0.12);

  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 12px;

  --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
  --space-4: 16px; --space-6: 24px; --space-8: 32px;
  --space-10: 40px; --space-12: 48px; --space-16: 64px;
}

[data-theme="dark"] {
  --color-bg:          #0d1117;
  --color-surface:     #161b22;
  --color-border:      #30363d;
  --color-border-muted:#21262d;

  --color-text:        #e6edf3;
  --color-text-muted:  #848d97;
  --color-text-faint:  #6e7681;

  --color-primary:     #58a6ff;
  --color-primary-bg:  #0c2d6b;

  --color-success:     #3fb950;
  --color-success-bg:  #0f2e15;
  --color-warning:     #d29922;
  --color-warning-bg:  #2e2000;
  --color-error:       #f85149;
  --color-error-bg:    #2d0f0e;

  --color-code-bg:     #161b22;
  --color-code-text:   #e6edf3;
  --color-blockquote:  #58a6ff;

  --color-table-head:  #161b22;
  --color-table-row-alt:#161b22;

  --shadow-sm: 0 1px 0 rgba(0,0,0,0.3);
  --shadow-md: 0 3px 6px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.3);
}

/* ─── Base ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  scroll-behavior: smooth;
  scroll-padding-top: var(--space-6);
}

body {
  font-family:    var(--font-body);
  font-size:      16px;
  line-height:    1.75;
  color:          var(--color-text);
  background:     var(--color-bg);
  padding:        var(--space-8) var(--space-6);
  max-width:      860px;
  margin:         0 auto;
  word-wrap:      break-word;
}

/* ─── Typography ─────────────────────────────────────────────── */
h1, h2, h3, h4, h5, h6 {
  font-weight:   600;
  line-height:   1.25;
  margin-top:    var(--space-8);
  margin-bottom: var(--space-3);
  color:         var(--color-text);
}

h1 { font-size: 2em;    padding-bottom: 0.3em; border-bottom: 1px solid var(--color-border); }
h2 { font-size: 1.5em;  padding-bottom: 0.3em; border-bottom: 1px solid var(--color-border); }
h3 { font-size: 1.25em; }
h4 { font-size: 1em; }
h5 { font-size: 0.875em; }
h6 { font-size: 0.85em; color: var(--color-text-muted); }

h1:first-child { margin-top: 0; }

p {
  margin-top:    0;
  margin-bottom: var(--space-4);
}

a {
  color:           var(--color-primary);
  text-decoration: none;
}
a:hover { text-decoration: underline; }

strong { font-weight: 600; }
em     { font-style: italic; }

del {
  color:           var(--color-text-muted);
  text-decoration: line-through;
}

/* ─── Lists ──────────────────────────────────────────────────── */
ul, ol {
  margin-top:    0;
  margin-bottom: var(--space-4);
  padding-left:  var(--space-6);
}

li { margin: var(--space-1) 0; }
li > p { margin-bottom: var(--space-2); }

/* Task list */
ul.contains-task-list { list-style: none; padding-left: var(--space-2); }
li.task-list-item { display: flex; align-items: flex-start; gap: var(--space-2); }
li.task-list-item input[type="checkbox"] {
  margin-top:    3px;
  accent-color:  var(--color-primary);
  width:         16px;
  height:        16px;
  flex-shrink:   0;
}

/* ─── Blockquote ─────────────────────────────────────────────── */
blockquote {
  margin:        0 0 var(--space-4);
  padding:       var(--space-3) var(--space-4);
  color:         var(--color-text-muted);
  border-left:   4px solid var(--color-blockquote);
  background:    color-mix(in oklab, var(--color-primary) 6%, var(--color-bg));
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
}

blockquote > :last-child { margin-bottom: 0; }

/* ─── Code ───────────────────────────────────────────────────── */
code {
  font-family:      var(--font-mono);
  font-size:        0.875em;
  background:       var(--color-code-bg);
  color:            var(--color-code-text);
  padding:          0.2em 0.45em;
  border-radius:    var(--radius-sm);
  border:           1px solid var(--color-border-muted);
}

pre {
  margin-bottom:    var(--space-4);
  overflow:         auto;
  border-radius:    var(--radius-md);
  border:           1px solid var(--color-border);
  background:       var(--color-code-bg) !important;
}

pre code {
  display:          block;
  padding:          var(--space-4);
  background:       transparent !important;
  border:           none;
  font-size:        0.875em;
  line-height:      1.65;
  white-space:      pre;
  overflow-x:       auto;
  scrollbar-width:  thin;
}

.hljs { background: transparent !important; }

/* ─── Tables ─────────────────────────────────────────────────── */
table {
  width:            100%;
  border-collapse:  collapse;
  margin-bottom:    var(--space-4);
  display:          block;
  overflow-x:       auto;
  border-radius:    var(--radius-md);
  border:           1px solid var(--color-border);
}

thead tr {
  background:       var(--color-table-head);
  border-bottom:    2px solid var(--color-border);
}

th {
  font-weight:      600;
  font-size:        0.875em;
  text-transform:   uppercase;
  letter-spacing:   0.04em;
  color:            var(--color-text-muted);
  padding:          var(--space-3) var(--space-4);
  text-align:       left;
}

td {
  padding:          var(--space-3) var(--space-4);
  border-top:       1px solid var(--color-border-muted);
}

tbody tr:nth-child(even) { background: var(--color-table-row-alt); }

/* ─── Horizontal Rule ────────────────────────────────────────── */
hr {
  height:           1px;
  border:           none;
  background:       var(--color-border);
  margin:           var(--space-8) 0;
}

/* ─── Images ─────────────────────────────────────────────────── */
img {
  max-width:        100%;
  height:           auto;
  border-radius:    var(--radius-md);
  display:          block;
  margin:           var(--space-4) auto;
  box-shadow:       var(--shadow-md);
}

/* ─── Anchor Headers ─────────────────────────────────────────── */
.anchor {
  color:            var(--color-text-faint);
  opacity:          0;
  margin-left:      var(--space-2);
  text-decoration:  none;
  transition:       opacity 150ms ease;
}

h1:hover .anchor, h2:hover .anchor,
h3:hover .anchor, h4:hover .anchor { opacity: 1; }

/* ─── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background:       var(--color-border);
  border-radius:    var(--radius-lg);
  border:           2px solid var(--color-bg);
}
::-webkit-scrollbar-thumb:hover { background: var(--color-text-faint); }

/* ─── Selection ──────────────────────────────────────────────── */
::selection {
  background: color-mix(in oklab, var(--color-primary) 20%, transparent);
  color:      var(--color-text);
}

/* ─── Print ──────────────────────────────────────────────────── */
@media print {
  body { max-width: 100%; padding: 1cm; }
  pre, blockquote { page-break-inside: avoid; }
  h1, h2, h3 { page-break-after: avoid; }
}
</style>
</head>

<body>
  <article id="md-content">
    {{CONTENT}}
  </article>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Syntax highlighting
      document.querySelectorAll('pre code').forEach(el => {
        hljs.highlightElement(el);
      });

      // Theme sync helper (called from C++ via ExecuteScriptAsync)
      window.setTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        const lightStyle = document.getElementById('hljs-theme-light');
        const darkStyle  = document.getElementById('hljs-theme-dark');
        if (theme === 'dark') {
          lightStyle.disabled = true;
          darkStyle.disabled  = false;
        } else {
          lightStyle.disabled = false;
          darkStyle.disabled  = true;
        }
      };

      // Add anchor links to headings
      document.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(h => {
        const id = h.textContent
          .toLowerCase()
          .replace(/[^\w\s-]/g, '')
          .replace(/\s+/g, '-');
        h.id = id;
        const a = document.createElement('a');
        a.href      = '#' + id;
        a.className = 'anchor';
        a.innerHTML = '#';
        h.appendChild(a);
      });

      // Open external links in system browser via postMessage to host
      document.querySelectorAll('a[href]').forEach(a => {
        if (a.href.startsWith('http')) {
          a.addEventListener('click', e => {
            e.preventDefault();
            window.chrome.webview.postMessage({ type: 'openUrl', url: a.href });
          });
        }
      });
    });
  </script>
</body>
</html>
